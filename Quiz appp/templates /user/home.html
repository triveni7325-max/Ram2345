{% extends "layout.html" %}

{% block content %}

<style>

/* Header */
.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

/* Card */
.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

/* Link */
.card a{
text-decoration:none;
color:black;
font-weight:bold;
font-size:16px;
display:block;
}

</style>

<!-- Page Content -->
<div class="header">
Select Category
</div>

{% for c in categories %}
<div class="card">

    <a href="/user/user_quiz/{{ c[0] }}">
        {{ c[1] }}
    </a>

</div>
{% endfor %}

{% endblock %}
