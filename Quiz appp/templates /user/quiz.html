{% extends "layout.html" %}

{% block content %}

<style>
.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Buttons */
.btn{
padding:6px 12px;
border-radius:5px;
text-decoration:none;
color:white;
}

/* Start */
.start{
background:#4CAF50;
}

/* View Score */
.score{
background:#2196F3;
}
</style>

<div class="header">Quiz List</div>

{% for q in quizzes %}
<div class="card">

    <!-- Quiz Name -->
    <div>{{ q.name }}</div>

    <!-- 🔥 Button Logic -->
    {% if q.attempted %}

        <!-- Already Attempted -->
        <a href="/user/score?quiz_id={{ q.id }}" class="btn score">
            📊 View Score
        </a>

    {% else %}

        <!-- New Quiz -->
        <a href="/user/play/{{ q.id }}" class="btn start">
            ▶ Start
        </a>

    {% endif %}

</div>
{% endfor %}

{% endblock %}
