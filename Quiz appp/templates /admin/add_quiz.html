<!DOCTYPE html>
<html>
<head>
<title>Add Quiz</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
width:300px;
margin:100px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
width:95%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Add Quiz</h2>

<form method="POST">
<input type="number" name="time" placeholder="Time (in minutes)" required>

<input type="text" name="quiz_name" placeholder="Enter Quiz Name" required>

<button type="submit">Add Quiz</button>

</form>

<br>

<a href="/category">Back</a>

</div>

</body>
</html>
