<!DOCTYPE html>
<html>
<head>
<title>Questions</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.q{
font-weight:bold;
margin-bottom:10px;
}

.opt{
margin-left:10px;
}

.correct{
color:green;
font-weight:bold;
margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Questions</h2>

{% for q in questions %}
<div class="card">

<div class="q">
Q: {{ q[0] }}
</div>

<div class="opt">A. {{ q[1] }}</div>
<div class="opt">B. {{ q[2] }}</div>
<div class="opt">C. {{ q[3] }}</div>
<div class="opt">D. {{ q[4] }}</div>

<div class="correct">
✔ Correct: {{ q[5] }}
</div>

</div>
{% endfor %}

<a href="/category">⬅ Back</a>

</div>

</body>
</html>
