<!DOCTYPE html>
<html>
<head>
<title>Add Question</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* Header */
.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

/* Container */
.container{
max-width:450px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Input */
input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* Button */
button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

/* Back */
.back{
display:block;
text-align:center;
margin-top:10px;
text-decoration:none;
color:#333;
}

</style>

</head>

<body>

<div class="header">
Add Question
</div>

<div class="container">

<form method="POST">

<input type="text" name="question" placeholder="Enter Question" required>

<input type="text" name="option1" placeholder="Option A" required>
<input type="text" name="option2" placeholder="Option B" required>
<input type="text" name="option3" placeholder="Option C" required>
<input type="text" name="option4" placeholder="Option D" required>

<select name="correct" required>
<option value="">Select Correct Answer</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
</select>

<input type="number" name="marks" placeholder="Marks" required>

<button type="submit">Add Question</button>

</form>

<!-- ✅ FIXED BACK -->
<a href="/admin/category" class="back">⬅ Back</a>

</div>

</body>
</html>
