<!DOCTYPE html>
<html>
<head>
<title>Bulk Add Questions</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0f2f5;
}

/* Header */
.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* Container */
.container{
max-width:600px;
margin:30px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Textarea */
textarea{
width:100%;
height:250px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* Button */
button{
width:100%;
padding:12px;
margin-top:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#45a049;
}

/* Back */
.back{
display:block;
text-align:center;
margin-top:10px;
text-decoration:none;
color:#333;
}

</style>

</head>

<body>

<div class="header">
Bulk Add Questions
</div>

<div class="container">

<form method="POST">

<textarea name="data" placeholder="Format:
Question|Option A|Option B|Option C|Option D|Correct|Marks"></textarea>

<button type="submit">Add All Questions</button>

</form>

<a href="/quiz/{{ quiz_id }}" class="back">⬅ Back to Quiz</a>

</div>

</body>
</html>
