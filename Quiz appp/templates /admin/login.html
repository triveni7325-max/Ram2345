<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin-top:100px;
}

.container{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
width:95%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

a{
text-decoration:none;
color:blue;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<p>Don't have account?</p>

<a href="/register">Register</a>

</div>

</body>
</html>
